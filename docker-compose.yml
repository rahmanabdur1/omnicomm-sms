version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnicomm_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omnicomm_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: omnicomm_backend
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: omnicomm_frontend
    ports:
      - "3000:3000"
    env_file: .env

  nginx:
    image: nginx:alpine
    container_name: omnicomm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data: