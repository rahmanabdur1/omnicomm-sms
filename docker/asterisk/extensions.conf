[general]
static=yes
writeprotect=no

[omnicomm]
; Inbound call → IVR
exten => s,1,Answer()
exten => s,n,Wait(1)
exten => s,n,Background(ivr-welcome)
exten => s,n,WaitExten(10)

; IVR option 1 → Sales
exten => 1,1,Playback(connecting-sales)
exten => 1,n,Dial(SIP/sales,30)
exten => 1,n,Hangup()

; IVR option 2 → Support
exten => 2,1,Playback(connecting-support)
exten => 2,n,Dial(SIP/support,30)
exten => 2,n,Hangup()

; IVR option 0 → Operator
exten => 0,1,Dial(SIP/operator,30)
exten => 0,n,Hangup()

; Timeout / invalid
exten => t,1,Playback(invalid)
exten => t,n,Goto(s,1)
exten => i,1,Playback(invalid)
exten => i,n,Goto(s,1)

[auto-dialer]
exten => _X.,1,NoOp(Auto-dialing ${EXTEN})
exten => _X.,n,Dial(SIP/${EXTEN},60)
exten => _X.,n,Record(/var/spool/asterisk/monitor/${UNIQUEID}.wav)
exten => _X.,n,Hangup()